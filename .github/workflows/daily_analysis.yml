name: Daily Market Analysis

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  analyse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance feedparser pandas numpy requests supabase

      - name: Run daily analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python daily_run.py

      - name: Commit results back to repo
        run: |
          git config user.name "Market Intel Bot"
          git config user.email "actions@github.com"
          git add data/latest_results.json data/history.json
          git diff --staged --quiet || git commit -m "Daily analysis — $(date +'%Y-%m-%d')"
          git push
